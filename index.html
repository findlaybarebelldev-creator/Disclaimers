<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>
</head>

<body>

Redirecting back to the app...

<script>

const params = new URLSearchParams(window.location.search)

const code = params.get("code")
const state = params.get("state")

if (code) {

    let appURL = "FindlayBarbell://oauth-callback/?code=" + code

    if (state) {
        appURL += "&state=" + state
    }

    window.location.href = appURL

} else {

    document.body.innerHTML = "No Patreon code received."

}

</script>

</body>
</html>
