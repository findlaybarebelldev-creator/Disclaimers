<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>

<script>
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (code) {
        window.location.href = "FindlayBarbell://oauth-callback/patreon?code=" + code;
    } else {
        document.body.innerText = "No code received from Patreon";
    }
};
</script>

</head>
<body>
Redirecting back to the app...
</body>
</html>
