<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy & Safety Policy - Beckley Fitness</title>
    <link rel="stylesheet" href="../StyleSheets/Styles.css">
</head>
<body>

    <header class="topbar">
        <img src="../Images/logo.png" alt="Logo" class="topbar-logo">
        <div class="title">Beckley Fitness</div>
        <marquee class="announcements">
            Privacy Policy and Safety Information
        </marquee>
    </header>

    <main class="content">
        <div class="policy-content" id="policy-content">
            <style>
                [data-custom-class='body'], [data-custom-class='body'] * {
                    background: transparent !important;
                }
                [data-custom-class='title'], [data-custom-class='title'] * {
                    font-family: Arial !important;
                    font-size: 26px !important;
                    color: #000000 !important;
                }
                [data-custom-class='subtitle'], [data-custom-class='subtitle'] * {
                    font-family: Arial !important;
                    color: #595959 !important;
                    font-size: 14px !important;
                }
                [data-custom-class='heading_1'], [data-custom-class='heading_1'] * {
                    font-family: Arial !important;
                    font-size: 19px !important;
                    color: #000000 !important;
                }
                [data-custom-class='heading_2'], [data-custom-class='heading_2'] * {
                    font-family: Arial !important;
                    font-size: 17px !important;
                    color: #000000 !important;
                }
                [data-custom-class='body_text'], [data-custom-class='body_text'] * {
                    color: #595959 !important;
                    font-size: 14px !important;
                    font-family: Arial !important;
                }
                [data-custom-class='link'], [data-custom-class='link'] * {
                    color: #3030F1 !important;
                    font-size: 14px !important;
                    font-family: Arial !important;
                    word-break: break-word !important;
                }
            </style>

            <span style="display: block;margin: 0 auto 3.125rem;width: 11.125rem;height: 2.375rem;background: url(data:image/svg+xml;base64,...) center no-repeat;"></span>

            <div data-custom-class="body">
                <div>
                    <strong>
                        <span style="font-size: 26px;">
                            <span data-custom-class="title">
                                <bdt class="block-component"></bdt>
                                <bdt class="question"><h1>PRIVACY POLICY</h1></bdt>
                                <bdt class="statement-end-if-in-editor"></bdt>
                            </span>
                        </span>
                    </strong>
                </div>

                <div>
                    <span style="color: rgb(127, 127, 127);">
                        <strong>
                            <span style="font-size: 15px;">
                                <span data-custom-class="subtitle">
                                    Last updated <bdt class="question">February 26, 2026</bdt>
                                </span>
                            </span>
                        </strong>
                    </span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const policy = document.getElementById("policy-content");

        if (policy) {

            policy.querySelectorAll("style").forEach(el => el.remove());

            policy.querySelectorAll("span").forEach(el => {
                const bg = el.getAttribute("style") || "";
                if (bg.includes("data:image/svg+xml;base64")) {
                    el.remove();
                }
            });

            // Remove all <bdt> tags but keep their contents
            policy.querySelectorAll("bdt").forEach(el => {
                el.replaceWith(...el.childNodes);
            });

            policy.querySelectorAll("[style]").forEach(el => {
                el.removeAttribute("style");
            });
            policy.querySelectorAll("div, span, p, strong, em").forEach(el => {
                if (!el.textContent.trim() && el.children.length === 0) {
                    el.remove();
                }
            });
        }
    </script>

</body>
</html>
